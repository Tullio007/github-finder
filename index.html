<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Finder</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:   "var(--color-ink)",
            coal:  "var(--color-coal)",
            slate: "var(--color-slate)",
            stone: "var(--color-stone)",
            ash:   "var(--color-ash)",
            mute:  "var(--color-mute)",
            fog:   "var(--color-fog)",
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="mx-auto flex min-h-dvh max-w-2xl flex-col gap-8 px-4 py-10 sm:py-16">

    <header class="flex flex-col items-center gap-3 text-center">
      <span class="brand__badge">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.54-3.88-1.54-.52-1.34-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.06.78 2.14v3.17c0 .31.21.68.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5Z" />
        </svg>
      </span>
      <h1 class="brand__title">GitHub Finder</h1>
      <p class="brand__subtitle">Busque o perfil e os projetos de qualquer desenvolvedor no GitHub.</p>
    </header>

    <form id="form-busca" class="flex flex-col gap-3" novalidate>
      <label for="campo-usuario" class="field-label">Nome de usuário</label>
      <div class="flex flex-col gap-3 sm:flex-row">
        <input
          id="campo-usuario"
          class="input"
          type="text"
          autocomplete="off"
          placeholder="ex.: torvalds"
        />
        <button id="botao-buscar" class="btn btn--primary" type="submit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <span>Buscar</span>
        </button>
      </div>
    </form>

    <p id="aviso" class="alert is-hidden" role="status" aria-live="polite"></p>

    <section id="resultado" class="is-hidden flex flex-col gap-8">
      <article class="profile">
        <img id="avatar" class="profile__avatar" src="" alt="" />
        <div>
          <h2 id="nome" class="profile__name"></h2>
          <a id="login" class="profile__login" href="#" target="_blank" rel="noopener"></a>
          <p id="bio" class="profile__bio is-hidden"></p>
        </div>
      </article>

      <div class="flex flex-col gap-4">
        <h3 class="repos__title">Repositórios recentes</h3>
        <div id="lista-repos" class="repos__grid"></div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
